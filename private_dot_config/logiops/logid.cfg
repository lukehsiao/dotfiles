// Button reference (MX Master 4):
//   0x0c4 → Top button behind scroll wheel
//   0x052 → Middle click (wheel press)
//   0x053 → Back button (side)
//   0x056 → Forward button (side)
//   0x0c3 → Gesture button (thumb)
//   0x1a0 → Thumb button (bottom-left corner)

devices: (
  {
    name: "MX Master 4";

    // Start at 8000 DPI
    dpi: 8000;

    smartshift: {
      on: true;
      threshold: 15;
    };

    hiresscroll: {
      on: true;
    };

    buttons: (
      // Button behind scroll wheel should toggle between 8000 and 2000 DPI
      {
        cid: 0xc4;
        action: {
          type: "CycleDPI";
          dpis: [8000, 2000];
        };
      }
    );
  }
);
